<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Current Password — Q Ed</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0c0c0a; --card: #141412; --border: #252520;
    --ink: #edeade; --muted: #7a7868; --accent: #c8943a; --accent-dim: #2a1f0a;
    --green: #3aaf6b; --green-dim: #0a1a10;
  }
  html, body {
    min-height: 100vh; background: var(--bg);
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Mono', monospace; -webkit-font-smoothing: antialiased;
  }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: radial-gradient(circle, #2a2a22 1px, transparent 1px);
    background-size: 28px 28px; opacity: 0.5; pointer-events: none;
  }
  .card {
    position: relative; z-index: 1; width: min(340px, 92vw);
    background: var(--card); border: 1px solid var(--border);
    padding: 2.4rem 2rem 2rem;
    animation: appear 0.6s cubic-bezier(0.16,1,0.3,1) forwards;
    opacity: 0; transform: translateY(20px);
  }
  @keyframes appear { to { opacity: 1; transform: translateY(0); } }
  .card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
  }
  .eyebrow {
    font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 6px;
  }
  .title {
    font-family: 'Cormorant Garamond', serif; font-size: 1.8rem;
    font-weight: 300; color: var(--ink); margin-bottom: 1.6rem; line-height: 1.1;
  }
  .title em { font-style: italic; color: var(--accent); }
  .divider { border: none; border-top: 1px solid var(--border); margin-bottom: 1.4rem; }
  .label {
    font-size: 9px; letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 6px;
  }
  .password-display {
    background: var(--green-dim); border: 1px solid var(--green);
    padding: 14px 16px; margin-bottom: 1rem;
    display: flex; align-items: center; justify-content: space-between;
  }
  .password-text {
    font-size: 1.4rem; font-weight: 500; color: var(--green);
    letter-spacing: 0.06em;
  }
  .copy-btn {
    background: transparent; border: 1px solid var(--green);
    color: var(--green); font-family: 'DM Mono', monospace;
    font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase;
    padding: 4px 10px; cursor: pointer; transition: all 0.15s;
  }
  .copy-btn:hover { background: var(--green); color: #000; }
  .hint-row {
    font-size: 10px; color: var(--muted); letter-spacing: 0.06em;
    margin-bottom: 1.2rem; line-height: 1.6;
  }
  .hint-row span { color: var(--accent); }
  .open-btn {
    display: flex; align-items: center; justify-content: space-between;
    width: 100%; padding: 13px 14px;
    background: transparent; border: 1px solid var(--border);
    color: var(--ink); font-family: 'DM Mono', monospace;
    font-size: 11px; letter-spacing: 0.06em;
    cursor: pointer; transition: all 0.15s; text-decoration: none;
  }
  .open-btn:hover { border-color: var(--accent); color: var(--accent); }
  .expires {
    margin-top: 1.2rem; font-size: 9px; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--border); text-align: center;
  }
  .expires span { color: var(--muted); }
  .loading { color: var(--muted); font-size: 11px; letter-spacing: 0.1em; }
  .error { color: #ff5555; font-size: 11px; letter-spacing: 0.06em; line-height: 1.6; }
</style>
</head>
<body>
<div class="card">
  <div class="eyebrow">Q Ed · The Commons</div>
  <div class="title">Current <em>password</em></div>
  <hr class="divider">
  <div id="content"><div class="loading">Loading…</div></div>
  <div class="expires" id="expires"></div>
</div>

<script>
  async function load() {
    try {
      const res = await fetch('/passwords.json');
      const data = await res.json();
      const { password, hint, url, expires } = data.current;

      document.getElementById('content').innerHTML = `
        <div class="label">Password</div>
        <div class="password-display">
          <div class="password-text" id="pw">${password}</div>
          <button class="copy-btn" onclick="copy()">Copy</button>
        </div>
        <div class="hint-row">Hint: <span>${hint}</span></div>
        <a class="open-btn" href="${url}" target="_blank">
          <span>Open the page →</span>
          <span>↗</span>
        </a>
      `;

      if (expires) {
        const d = new Date(expires);
        const days = Math.ceil((d - new Date()) / 86400000);
        document.getElementById('expires').innerHTML =
          days > 0
            ? `Page expires in <span>${days} day${days !== 1 ? 's' : ''}</span>`
            : `<span style="color:#ff5555">This page has expired</span>`;
      }
    } catch(e) {
      document.getElementById('content').innerHTML =
        `<div class="error">Could not load password data.<br>Check passwords.json is in your repo root.</div>`;
    }
  }

  function copy() {
    const pw = document.getElementById('pw').textContent;
    navigator.clipboard.writeText(pw).then(() => {
      const btn = document.querySelector('.copy-btn');
      btn.textContent = 'Copied!';
      setTimeout(() => btn.textContent = 'Copy', 2000);
    });
  }

  load();
</script>
</body>
</html>
